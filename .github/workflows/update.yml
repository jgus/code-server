name: Update code-server

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27

      - name: Check for new release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current=$(grep 'version = ' flake.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')
          latest=$(gh api repos/coder/code-server/releases/latest --jq '.tag_name' | sed 's/^v//')
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$latest" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version and hashes
        if: steps.check.outputs.update == 'true'
        run: |
          version="${{ steps.check.outputs.latest }}"
          sed -i "s/version = \".*\"/version = \"${version}\"/" flake.nix

          declare -A platforms=(
            [linux-amd64]="x86_64-linux"
            [linux-arm64]="aarch64-linux"
            [linux-armv7l]="armv7l-linux"
            [macos-amd64]="x86_64-darwin"
            [macos-arm64]="aarch64-darwin"
          )

          for platform in "${!platforms[@]}"; do
            nix_system="${platforms[$platform]}"
            hash=$(nix hash convert --to sri --hash-algo sha256 \
              $(nix-prefetch-url \
                "https://github.com/coder/code-server/releases/download/v${version}/code-server-${version}-${platform}.tar.gz" \
                2>/dev/null))
            sed -i "/${nix_system}.*=.*{/,/};/{s|hash = \"sha256-[^\"]*\"|hash = \"${hash}\"|}" flake.nix
          done

      - name: Update flake lock
        if: steps.check.outputs.update == 'true'
        run: nix flake update

      - name: Commit and tag
        if: steps.check.outputs.update == 'true'
        run: |
          version="${{ steps.check.outputs.latest }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix flake.lock
          git commit -m "Update code-server to v${version}"
          git tag "v${version}"
          git push
          git push --tags
